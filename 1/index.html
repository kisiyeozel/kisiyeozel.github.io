<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kişiye Özel Ürün Tasarım Atölyesi | Kisiyeozel.org</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a1628 0%, #000000 100%);
            color: #d4af37;
            min-height: 100vh;
            position: relative;
        }
        
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        
        .logo-badge {
            position: fixed;
            top: 24px; left: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 2px 20px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #d4af37;
            backdrop-filter: blur(10px);
            animation: pulse 2s infinite;
        }
        
        .badge::before {
            content: '';
            width: 8px; height: 8px;
            background: #d4af37;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .control-panel {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 24px;
            width: calc(100% - 48px);
            max-width: 360px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .control-panel.hidden {
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
        }
        
        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            color: #d4af37;
        }
        
        .product-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: rgba(212, 175, 55, 0.6);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab-btn:hover { background: rgba(212, 175, 55, 0.1); }
        
        .tab-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            color: #d4af37;
        }
        
        .input-group { margin-bottom: 20px; }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: rgba(212, 175, 55, 0.7);
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: #d4af37;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .input-group input::placeholder { color: rgba(212, 175, 55, 0.4); }
        .input-group input:focus { border-color: #d4af37; }
        
        .confirm-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            border: none;
            border-radius: 12px;
            color: #0a1628;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }
        
        .result-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        
        .result-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .result-screen h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 4px 40px rgba(212, 175, 55, 0.5);
            letter-spacing: 8px;
            margin-bottom: 40px;
        }
        
        .coupon-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .coupon-line {
            width: 80px;
            height: 1px;
            background: repeating-linear-gradient(90deg, #d4af37 0, #d4af37 4px, transparent 4px, transparent 8px);
            opacity: 0.6;
        }
        
        .coupon-code {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: #d4af37;
            padding: 16px 32px;
            border: 1px dashed rgba(212, 175, 55, 0.5);
            letter-spacing: 4px;
        }
        
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: #d4af37;
            z-index: 50;
        }
        
        @media (max-width: 480px) {
            .logo { font-size: 22px; }
            .badge { font-size: 11px; padding: 6px 12px; }
            .control-panel { bottom: 16px; right: 16px; left: 16px; width: auto; padding: 20px; }
            .result-screen h1 { font-size: 42px; letter-spacing: 4px; }
            .coupon-code { font-size: 18px; padding: 12px 20px; }
            .coupon-line { width: 50px; }
        }
    </style>
</head>
<body>
    <div id="loading">Yükleniyor...</div>
    <div id="canvas-container"></div>
    
    <div class="logo-badge">
        <div class="logo">KISIYEOZEL</div>
        <div class="badge">1 Haziran'da Açılıyoruz</div>
    </div>
    
    <div class="control-panel" id="controlPanel">
        <div class="panel-title">Ürün Tasarım Atölyesi</div>
        <div class="product-tabs">
            <button class="tab-btn active" data-product="monopoly">Monopoly</button>
            <button class="tab-btn" data-product="kitap">Kitap</button>
            <button class="tab-btn" data-product="takvim">Takvim</button>
        </div>
        <div class="input-group">
            <label>Ürüne yazılacak isim</label>
            <input type="text" id="customText" placeholder="İsminizi girin..." maxlength="20">
        </div>
        <button class="confirm-btn" id="confirmBtn">Tasarımımı Onayla</button>
    </div>
    
    <div class="result-screen" id="resultScreen">
        <h1>1 HAZİRAN</h1>
        <div class="coupon-container">
            <div class="coupon-line"></div>
            <div class="coupon-code">KISIYEOZEL26</div>
            <div class="coupon-line"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls;
        let currentProduct = 'monopoly';
        let productMesh, textPlane;
        let textCanvas, textCtx;
        let particles;
        let isAnimating = false;
        
        const GOLD_COLOR = 0xd4af37;
        const DARK_COLOR = 0x1a1a1a;
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 10;
            controls.enablePan = false;
            
            setupLights();
            createProduct(currentProduct);
            setupCanvasTexture();
            setupEventListeners();
            
            document.getElementById('loading').style.display = 'none';
            animate();
        }
        
        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);
            
            const spotLight1 = new THREE.SpotLight(GOLD_COLOR, 1);
            spotLight1.position.set(5, 8, 5);
            spotLight1.angle = Math.PI / 4;
            spotLight1.penumbra = 0.5;
            spotLight1.castShadow = true;
            scene.add(spotLight1);
            
            const spotLight2 = new THREE.SpotLight(0xfff5e6, 0.8);
            spotLight2.position.set(-5, 6, -3);
            spotLight2.angle = Math.PI / 5;
            spotLight2.penumbra = 0.3;
            scene.add(spotLight2);
            
            const pointLight1 = new THREE.PointLight(GOLD_COLOR, 0.5, 10);
            pointLight1.position.set(2, 3, 2);
            scene.add(pointLight1);
            
            const pointLight2 = new THREE.PointLight(0xffd700, 0.3, 8);
            pointLight2.position.set(-2, 1, 3);
            scene.add(pointLight2);
        }
        
        function createProduct(type) {
            if (productMesh) scene.remove(productMesh);
            if (textPlane) scene.remove(textPlane);
            
            let geometry, textGeometry;
            const material = new THREE.MeshPhongMaterial({
                color: DARK_COLOR,
                shininess: 100,
                specular: 0x444444
            });
            
            switch(type) {
                case 'monopoly':
                    geometry = new THREE.BoxGeometry(3, 0.3, 2);
                    textGeometry = new THREE.PlaneGeometry(2.5, 0.8);
                    break;
                case 'kitap':
                    geometry = new THREE.BoxGeometry(1.5, 2.2, 0.3);
                    textGeometry = new THREE.PlaneGeometry(1.3, 1.8);
                    break;
                case 'takvim':
                    geometry = new THREE.BoxGeometry(1.8, 2.5, 0.1);
                    textGeometry = new THREE.PlaneGeometry(1.6, 2.3);
                    break;
            }
            
            productMesh = new THREE.Mesh(geometry, material);
            productMesh.castShadow = true;
            productMesh.receiveShadow = true;
            scene.add(productMesh);
            
            const textMaterial = new THREE.MeshBasicMaterial({
                transparent: true,
                side: THREE.DoubleSide
            });
            textPlane = new THREE.Mesh(textGeometry, textMaterial);
            
            switch(type) {
                case 'monopoly':
                    textPlane.position.set(0, 0.16, 0);
                    textPlane.rotation.x = -Math.PI / 2;
                    break;
                case 'kitap':
                    textPlane.position.set(0, 0, 0.16);
                    break;
                case 'takvim':
                    textPlane.position.set(0, 0, 0.06);
                    textPlane.rotation.x = -0.1;
                    break;
            }
            
            scene.add(textPlane);
            updateTextTexture(document.getElementById('customText').value);
        }
        
        function setupCanvasTexture() {
            textCanvas = document.createElement('canvas');
            textCanvas.width = 512;
            textCanvas.height = 512;
            textCtx = textCanvas.getContext('2d');
        }
        
        function updateTextTexture(text) {
            if (!text || text.trim() === '') text = 'KISIYEOZEL';
            
            textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            
            const gradient = textCtx.createLinearGradient(0, 0, textCanvas.width, textCanvas.height);
            gradient.addColorStop(0, '#d4af37');
            gradient.addColorStop(0.5, '#f0d875');
            gradient.addColorStop(1, '#d4af37');
            
            textCtx.fillStyle = gradient;
            textCtx.font = '600 72px "Playfair Display", serif';
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            
            textCtx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            textCtx.shadowBlur = 15;
            textCtx.shadowOffsetX = 3;
            textCtx.shadowOffsetY = 3;
            
            const textMetrics = textCtx.measureText(text);
            let fontSize = 72;
            if (textMetrics.width > textCanvas.width * 0.8) {
                fontSize = (textCanvas.width * 0.8 * 72) / textMetrics.width;
                textCtx.font = `600 ${fontSize}px "Playfair Display", serif`;
            }
            
            textCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);
            
            textCtx.shadowColor = 'rgba(255, 215, 0, 0.8)';
            textCtx.shadowBlur = 20;
            textCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);
            
            const texture = new THREE.CanvasTexture(textCanvas);
            texture.needsUpdate = true;
            textPlane.material.map = texture;
            textPlane.material.needsUpdate = true;
        }
        
        function setupEventListeners() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentProduct = tab.dataset.product;
                    createProduct(currentProduct);
                });
            });
            
            document.getElementById('customText').addEventListener('input', (e) => {
                updateTextTexture(e.target.value);
            });
            
            document.getElementById('confirmBtn').addEventListener('click', startFinalAnimation);
            window.addEventListener('resize', onWindowResize);
        }
        
        function startFinalAnimation() {
            if (isAnimating) return;
            isAnimating = true;
            document.getElementById('controlPanel').classList.add('hidden');
            animateCameraToProduct();
        }
        
        function animateCameraToProduct() {
            const targetPosition = new THREE.Vector3(0, 1, 2);
            const startPosition = camera.position.clone();
            const startTime = Date.now();
            const duration = 1500;
            
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                
                camera.position.lerpVectors(startPosition, targetPosition, eased);
                controls.target.set(0, 0, 0);
                
                if (progress < 1) {
                    requestAnimationFrame(updateCamera);
                } else {
                    createParticleEffect();
                    setTimeout(() => {
                        document.getElementById('resultScreen').classList.add('visible');
                    }, 500);
                }
            }
            updateCamera();
        }
        
        function createParticleEffect() {
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
                velocities.push({
                    x: (Math.random() - 0.5) * 0.02,
                    y: Math.random() * 0.03 + 0.01,
                    z: (Math.random() - 0.5) * 0.02
                });
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: GOLD_COLOR,
                size: 0.08,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            particles.userData.velocities = velocities;
            particles.userData.startTime = Date.now();
        }
        
        function animateParticles() {
            if (!particles) return;
            
            const positions = particles.geometry.attributes.position.array;
            const velocities = particles.userData.velocities;
            
            for (let i = 0; i < velocities.length; i++) {
                positions[i * 3] += velocities[i].x;
                positions[i * 3 + 1] += velocities[i].y;
                positions[i * 3 + 2] += velocities[i].z;
                
                if (positions[i * 3 + 1] > 4) {
                    positions[i * 3 + 1] = -3;
                    positions[i * 3] = (Math.random() - 0.5) * 4;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
                }
            }
            
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.001;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            animateParticles();
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
