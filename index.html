<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kisiyeozel.org - 3D Tasarım Atölyesi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #1a202c 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Sol Üst Logo ve Tarih */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #d4af37;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .date-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Sağ Alt Kontrol Paneli */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
            transition: transform 0.5s, opacity 0.5s;
        }

        #ui-panel.hidden {
            transform: translateY(150%);
            opacity: 0;
            pointer-events: none;
        }

        .panel-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .product-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .product-btn {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .product-btn.active {
            background: #d4af37;
            border-color: #d4af37;
            color: black;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px;
            color: #d4af37;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: rgba(212, 175, 55, 0.3);
        }

        #btn-confirm {
            background: linear-gradient(45deg, #d4af37, #f3e5ab);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        #btn-confirm:active { transform: scale(0.95); }

        /* Sonuç Ekranı */
        #result-screen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
            z-index: 5;
            width: 100%;
        }

        #result-screen.fade-in {
            opacity: 1;
            pointer-events: auto;
        }
        
        #result-screen h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .discount-box {
            display: inline-block;
            background: rgba(0,0,0,0.8);
            border: 2px dashed #d4af37;
            padding: 20px 40px;
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin: 20px 0;
            border-radius: 15px;
            letter-spacing: 2px;
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #ui-panel {
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                bottom: 20px;
            }
            #ui-panel.hidden {
                transform: translate(50%, 150%);
            }
            .instruction { display: none; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="top-bar">
        <div class="logo">Kisiyeozel.org</div>
        <div class="date-badge">📅 1 Haziran'da Açılıyoruz</div>
    </div>

    <div class="instruction">
        <span style="font-size: 1.5rem;">👆</span><br>
        Ürünü incelemek için<br>sürükle ve çevir
    </div>

    <div id="ui-panel">
        <div class="panel-title">Tasarımını Oluştur</div>
        
        <div class="product-selector">
            <button class="product-btn active" data-type="monopoly">Monopoly</button>
            <button class="product-btn" data-type="book">Kitap</button>
            <button class="product-btn" data-type="calendar">Takvim</button>
        </div>

        <div class="input-group">
            <label>Ürüne Yazılacak İsim veya Mesaj</label>
            <input type="text" id="user-name" placeholder="Örn: Yılmaz Ailesi" maxlength="20" autocomplete="off">
        </div>

        <button id="btn-confirm">Tasarımımı Onayla</button>
    </div>

    <div id="result-screen">
        <p style="font-size: 1.2rem; color: #ccc;">Harika bir seçim!</p>
        <h1>1 HAZİRAN</h1>
        <p style="font-size: 1.1rem; max-width: 600px; margin: 0 auto; line-height: 1.6;">Bu tasarım 1 Haziran'da gerçeğe dönüşmeyi bekliyor. Açılış günü sitemize gel ve aşağıdaki kod ile bu ürüne özel indirimle sahip ol.</p>
        <div class="discount-box">KISIYEOZEL26</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let activeProduct, textMesh, particleSystem;
        let isConfirmed = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 5); // Kamerayı biraz daha yukarıdan baktırıyoruz

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enablePan = false;
            controls.minDistance = 2;
            controls.maxDistance = 8;

            // Premium Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xfffaed, 1); // Hafif sıcak ışık
            spotLight.position.set(5, 8, 5);
            spotLight.angle = Math.PI / 4;
            spotLight.penumbra = 0.5;
            scene.add(spotLight);

            const backLight = new THREE.PointLight(0xd4af37, 0.5); // Arkadan altın yansıması
            backLight.position.set(-5, 3, -5);
            scene.add(backLight);

            // Başlangıç ürünü
            switchProduct('monopoly');
            animate();
        }

        // Ürün Geometrileri ve Materyalleri
        function switchProduct(type) {
            if (activeProduct) {
                scene.remove(activeProduct);
            }

            // Koyu gri/siyah premium doku
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x151515, 
                shininess: 40,
                specular: 0x222222
            });

            let geometry;
            if (type === 'monopoly') {
                // Geniş ince oyun tahtası
                geometry = new THREE.BoxGeometry(3, 0.1, 3);
            } else if (type === 'book') {
                // Kalın kapaklı kitap
                geometry = new THREE.BoxGeometry(1.8, 2.4, 0.4);
            } else if (type === 'calendar') {
                // Masa takvimi yapısı (hafif eğimli)
                geometry = new THREE.BoxGeometry(2, 1.5, 0.1);
            }

            activeProduct = new THREE.Mesh(geometry, material);

            // Takvimse hafif dikleştir
            if(type === 'calendar') {
                activeProduct.rotation.x = -Math.PI / 6;
                activeProduct.position.y = 0.5;
            } else {
                activeProduct.rotation.x = 0;
                activeProduct.position.y = 0;
            }

            scene.add(activeProduct);
            
            // Mevcut yazıyı yeni ürüne uygula
            const currentName = document.getElementById('user-name').value || "İSMİNİZ";
            applyText(currentName, type);
        }

        // Şık, Altın Rengi Yazı Oluşturma
        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; 
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Altın rengi ve zarif tırnaklı font (Playfair/Georgia/Serif)
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 80px "Playfair Display", Georgia, serif'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Metne hafif gölge ekleyerek kabartma/varak hissi verme
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            ctx.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // Yazıyı ürüne yerleştirme
        function applyText(text, type) {
            if (textMesh) {
                activeProduct.remove(textMesh);
            }

            const textGeo = new THREE.PlaneGeometry(2.5, 0.625); // Oranı canvas'a uygun (1024x256)
            const textMat = new THREE.MeshBasicMaterial({
                map: createTextTexture(text),
                transparent: true,
                alphaTest: 0.1
            });

            textMesh = new THREE.Mesh(textGeo, textMat);

            // Ürüne göre yazının nerede duracağını ayarla
            if (type === 'monopoly') {
                textMesh.position.set(0, 0.051, 0); // Tahtanın tam üstü
                textMesh.rotation.x = -Math.PI / 2; // Yere paralel
            } else if (type === 'book') {
                textMesh.position.set(0, 0.5, 0.201); // Kitabın ön kapağının üst kısmı
                textMesh.rotation.x = 0;
                textMesh.scale.set(0.6, 0.6, 0.6); // Kitaba sığması için küçült
            } else if (type === 'calendar') {
                textMesh.position.set(0, 0, 0.051); // Takvimin ön yüzü
                textMesh.rotation.x = 0;
                textMesh.scale.set(0.7, 0.7, 0.7);
            }

            activeProduct.add(textMesh);
        }

        // Arayüz Dinleyicileri (UI Listeners)
        document.querySelectorAll('.product-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(isConfirmed) return;
                document.querySelector('.product-btn.active').classList.remove('active');
                e.target.classList.add('active');
                switchProduct(e.target.dataset.type);
            });
        });

        document.getElementById('user-name').addEventListener('input', (e) => {
            if(isConfirmed) return;
            const type = document.querySelector('.product-btn.active').dataset.type;
            applyText(e.target.value || "İSMİNİZ", type);
        });

        // Tasarımı Onayla Butonu
        document.getElementById('btn-confirm').addEventListener('click', () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) {
                alert("Lütfen tasarıma eklenecek bir isim yazın!");
                return;
            }

            isConfirmed = true;
            document.getElementById('ui-panel').classList.add('hidden');
            
            // Kamerayı ürüne odakla
            const targetCamPos = new THREE.Vector3(0, 2, 4);
            let camProgress = 0;
            const startCamPos = camera.position.clone();

            function focusAnimation() {
                camProgress += 0.02;
                if(camProgress <= 1) {
                    camera.position.lerpVectors(startCamPos, targetCamPos, camProgress);
                    camera.lookAt(0,0,0);
                    requestAnimationFrame(focusAnimation);
                } else {
                    createCelebration();
                    setTimeout(() => {
                        document.getElementById('result-screen').classList.add('fade-in');
                    }, 500);
                }
            }
            focusAnimation();
        });

        // Altın Partikül Efekti (Kutlama)
        function createCelebration() {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for(let i = 0; i < particleCount * 3; i+=3) {
                positions[i] = (Math.random() - 0.5) * 2; // x
                positions[i+1] = Math.random() * 2;       // y
                positions[i+2] = (Math.random() - 0.5) * 2; // z

                velocities.push({
                    x: (Math.random() - 0.5) * 0.05,
                    y: Math.random() * 0.05 + 0.02,
                    z: (Math.random() - 0.5) * 0.05
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xd4af37,
                size: 0.08,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            particleSystem.userData = { velocities: velocities };
            scene.add(particleSystem);
        }

        // Render Döngüsü
        function animate() {
            requestAnimationFrame(animate);

            // Kullanıcı onaylamadıysa ürün yavaşça dönsün
            if (!isConfirmed && activeProduct) {
                activeProduct.rotation.y += 0.002;
            }

            // Partikül animasyonu
            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                const vels = particleSystem.userData.velocities;
                
                for (let i = 0, j=0; i < positions.length; i += 3, j++) {
                    positions[i] += vels[j].x;
                    positions[i+1] += vels[j].y;
                    positions[i+2] += vels[j].z;

                    // Yerçekimi etkisi (yavaşça aşağı düşme)
                    vels[j].y -= 0.001; 

                    if (positions[i+1] < -2) {
                        positions[i+1] = 2; // Ekranın üstünden tekrar başla
                        vels[j].y = Math.random() * 0.05 + 0.02;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
