<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisiyeozel.org - 3D Deneyim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* UI Paneli */
        #ui-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.5s, transform 0.5s;
            z-index: 10;
        }

        #ui-panel.fade-out {
            opacity: 0;
            transform: translate(-50%, -60%);
            pointer-events: none;
        }

        .logo-text { font-size: 2rem; font-weight: 900; color: #ffd700; margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #ccc; margin-bottom: 30px; }

        input[type="text"] {
            width: 100%; padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px; color: white;
            font-size: 1.1rem; margin-bottom: 20px;
            text-align: center; outline: none;
        }

        .color-options {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;
        }

        .color-opt {
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: transform 0.2s;
        }

        .color-opt:hover { transform: scale(1.1); }
        .color-opt.selected { border-color: white; transform: scale(1.2); }

        #btn-prepare {
            background: linear-gradient(45deg, #ffd700, #ffae00);
            color: #000; border: none; padding: 15px;
            font-size: 1.1rem; font-weight: 900; border-radius: 30px;
            cursor: pointer; width: 100%; transition: transform 0.2s;
        }
        #btn-prepare:active { transform: scale(0.95); }

        /* Sonuç Ekranı */
        #result-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; opacity: 0; pointer-events: none;
            transition: opacity 1s; z-index: 5; width: 100%;
        }

        #result-screen.fade-in { opacity: 1; pointer-events: auto; }
        
        h1 {
            font-size: 3.5rem; font-weight: 900; margin: 10px 0;
            color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .discount-code {
            display: inline-block; border: 2px dashed #ffd700;
            padding: 15px 30px; font-size: 2rem; font-weight: 900;
            color: #fff; margin: 20px 0; border-radius: 10px;
            background: rgba(0,0,0,0.5);
        }

        #instruction {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); font-size: 0.8rem;
            color: rgba(255,255,255,0.4); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="logo-text">Kisiyeozel.org</div>
        <p class="subtitle">Sana özel dünyanın kapıları aralanıyor...</p>
        
        <input type="text" id="user-name" placeholder="Adını Buraya Yaz" maxlength="15" autocomplete="off">
        
        <div class="color-options">
            <div class="color-opt selected" style="background-color: #ffd700;" data-color="#ffd700"></div>
            <div class="color-opt" style="background-color: #ff4757;" data-color="#ff4757"></div>
            <div class="color-opt" style="background-color: #2ed573;" data-color="#2ed573"></div>
            <div class="color-opt" style="background-color: #1e90ff;" data-color="#1e90ff"></div>
        </div>

        <button id="btn-prepare">Kutumu Hazırla</button>
    </div>

    <div id="result-screen">
        <p>Senin İçin Hazırlandı</p>
        <h1>1 HAZİRAN</h1>
        <p>Büyük Açılışı Kaçırma!</p>
        <div class="discount-code">KISIYEOZEL2026</div>
        <p>İlk siparişine özel indirim kodun.</p>
    </div>

    <div id="instruction">Fare veya parmağınla kutuyu çevirebilirsin</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let box, boxCap, textMesh, particleSystem;
        let isOpened = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enablePan = false;
            controls.minDistance = 3;
            controls.maxDistance = 7;

            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(5, 5, 5);
            scene.add(spotLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-5, 5, -5);
            scene.add(pointLight);

            createBox();
            animate();
        }

        function createBox() {
            const material = new THREE.MeshPhongMaterial({
                color: 0x111111,
                shininess: 10,
            });

            const boxGeo = new THREE.BoxGeometry(2, 1.5, 2);
            box = new THREE.Mesh(boxGeo, material);
            scene.add(box);

            const capGeo = new THREE.BoxGeometry(2.1, 0.3, 2.1);
            boxCap = new THREE.Mesh(capGeo, material);
            boxCap.position.y = 0.9;
            box.add(boxCap); 
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; // Çözünürlüğü artırdık, yazı daha net olacak
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Arka planı tamamen temizle (şeffaf)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Beyaz renk, kalın font
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 90px Arial, sans-serif'; // Daha standart bir font kullandık
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // İsim çok uzunsa sığması için ayarlama
            ctx.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        let selectedColor = "#ffd700";
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelector('.color-opt.selected').classList.remove('selected');
                this.classList.add('selected');
                selectedColor = this.dataset.color;
            });
        });

        document.getElementById('btn-prepare').addEventListener('click', () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) {
                alert("Lütfen bir isim girin!");
                return;
            }

            document.getElementById('ui-panel').classList.add('fade-out');
            document.getElementById('instruction').style.display = 'none';

            transformBox(name, selectedColor);
        });

        function transformBox(name, colorHex) {
            const targetColor = new THREE.Color(colorHex);
            const startColor = box.material.color.clone();
            
            // Kutuyu tam olarak kameraya (öne) bakacak şekilde hizalamak için hedef açı hesapla
            const startRotY = box.rotation.y;
            // En yakın 360 dereceye (2 * PI) yuvarlıyoruz ki tam öne dönsün
            const targetRotY = Math.round(startRotY / (Math.PI * 2)) * Math.PI * 2; 

            let progress = 0;

            function animateColor() {
                progress += 0.02; 
                if (progress <= 1) {
                    // 1. Renk değiştir
                    box.material.color.lerpColors(startColor, targetColor, progress);
                    box.material.shininess = progress * 100;
                    boxCap.material.color.copy(box.material.color);
                    boxCap.material.shininess = box.material.shininess;

                    // 2. Kutuyu yumuşakça tam öne çevir
                    box.rotation.y = startRotY + (targetRotY - startRotY) * progress;

                    requestAnimationFrame(animateColor);
                } else {
                    box.rotation.y = targetRotY; // Son hizalamayı kesinleştir
                    addNameAndOpen(name);
                }
            }
            animateColor();
        }

        function addNameAndOpen(name) {
            const textPlaneGeo = new THREE.PlaneGeometry(1.8, 0.45);
            const textMaterial = new THREE.MeshBasicMaterial({
                map: createTextTexture(name),
                transparent: true,
                alphaTest: 0.1 // Siyah/şeffaf alanlardaki artefaktları engeller
            });
            textMesh = new THREE.Mesh(textPlaneGeo, textMaterial);
            
            // Yazıyı kutunun ön yüzeyine yapıştır
            textMesh.position.set(0, 0, 1.01); 
            box.add(textMesh);

            setTimeout(openBox, 1200);
        }

        function openBox() {
            isOpened = true;
            controls.enableRotate = false; 
            
            let camProgress = 0;
            const startCamPos = camera.position.clone();
            const targetCamPos = new THREE.Vector3(0, 1.5, 4.5);

            function openAnimation() {
                let animActive = false;

                if(camProgress < 1) {
                    camProgress += 0.02;
                    camera.position.lerpVectors(startCamPos, targetCamPos, camProgress);
                    camera.lookAt(0, 0, 0);
                    animActive = true;
                }

                if(boxCap.position.y < 3) {
                    boxCap.position.y += 0.02;
                    boxCap.position.z -= 0.01;
                    boxCap.rotation.x -= 0.015;
                    animActive = true;
                }

                if(animActive) {
                    requestAnimationFrame(openAnimation);
                } else {
                    createParticles();
                    setTimeout(() => {
                        document.getElementById('result-screen').classList.add('fade-in');
                    }, 500);
                }
            }
            openAnimation();
        }

        function createParticles() {
            const innerLight = new THREE.PointLight(0xffd700, 2, 10);
            innerLight.position.set(0, 0.5, 0);
            scene.add(innerLight);

            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for(let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 1.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.05,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isOpened && box) {
                // Sadece bekleme modundayken dönsün
                box.rotation.y += 0.003;
            }

            if (isOpened && particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] += 0.02; 
                    if (positions[i] > 3) {
                        positions[i] = 0; 
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
