<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişiye Özel</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .card { 
            background: rgba(30, 30, 50, 0.65); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(0, 173, 181, 0.1); 
            max-width: 420px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            margin: 20px auto;
        }
        /* Logo Alanı Düzenlemesi */
        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
            position: relative;
        }
        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00adb5;
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.4);
        }
        h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(45deg, #fff, #00adb5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #b3b3b3; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        
        .links a { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            text-decoration: none; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 12px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease; 
        }
        .links a:hover { 
            background: #00adb5; 
            box-shadow: 0 0 20px rgba(0, 173, 181, 0.4);
            transform: translateY(-2px);
            border-color: #00adb5;
        }
        
        /* Geri Sayım Sayacı */
        .countdown-title {
            margin-top: 35px;
            font-size: 12px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .countdown {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .countdown-item {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .countdown-time {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .countdown-label {
            font-size: 10px;
            color: #777;
            margin-top: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="https://i.hizliresim.com/r6775gw.png" alt="Logo" class="logo" onerror="this.src='https://ui-avatars.com/api/?name=KO&background=00adb5&color=fff'">
        </div>
        
        <h1>Kişiye Özel</h1>
        <p>Kişisel web sitemiz çok yakında yeni yüzüyle yayında olacak. Takipte kalın!</p>
        
        <div class="links">
            <a href="https://instagram.com/kisiyeozelorg" target="_blank">Instagram'da Takip Et</a>
            <a href="mailto:info@kisiyeozel.org">E-Posta Gönder</a>
        </div>

        <div class="countdown-title">Büyük Açılış</div>
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-time" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="minutes">00</span>
                <span class="countdown-label">Dk</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="seconds">00</span>
                <span class="countdown-label">Sn</span>
            </div>
        </div>
    </div>

    <script>
        // Hedef Tarih: 1 Haziran 2026
        const targetDate = new Date("June 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.querySelector('.countdown').innerHTML = "<span style='color:#00adb5; font-weight:bold; width:100%; padding: 5px 0;'>Sitemiz Yayında!</span>";
                clearInterval(interval);
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
