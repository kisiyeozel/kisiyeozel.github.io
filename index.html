<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişiye Özel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 400px; 
            width: 90%; 
            border: 1px solid #333; 
            margin: 20px auto;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00adb5;
            margin-bottom: 15px;
        }
        h1 { margin: 0 0 10px 0; font-size: 26px; color: #00adb5; }
        p { color: #eeeeee; font-size: 15px; margin-bottom: 20px; }
        .links a { 
            display: block; 
            background: #393e46; 
            color: #fff; 
            text-decoration: none; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .links a:hover { background: #00adb5; }
        
        /* Geri Sayım Sayacı Tasarımı */
        .countdown-title {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .countdown {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #222;
        }
        .countdown-item {
            display: flex;
            flex-direction: column;
        }
        .countdown-time {
            font-size: 20px;
            font-weight: bold;
            color: #00adb5;
        }
        .countdown-label {
            font-size: 11px;
            color: #aaa;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://hizliresim.com/r6775gw" alt="Logo" class="logo">
        
        <h1>Kişiye Özel</h1>
        <p>Kişisel web siteme hoş geldiniz. Çok yakında buradayız!</p>
        
        <div class="links">
            <a href="https://instagram.com/kisiyeozelorg" target="_blank">Instagram</a>
            <a href="mailto:https://hizliresim.com/r6775gw">E-Posta Gönder</a>
        </div>

        <div class="countdown-title">Büyük Açılışa Kalan Süre</div>
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-time" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="minutes">00</span>
                <span class="countdown-label">Dk</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="seconds">00</span>
                <span class="countdown-label">Sn</span>
            </div>
        </div>
    </div>

    <script>
        // Şu andan tam 1 ay sonrasını (30 gün) hedef tarih olarak ayarla
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.querySelector('.countdown').innerHTML = "<span style='color:#00adb5; font-weight:bold; width:100%;'>Sitemiz Yayında!</span>";
                clearInterval(interval);
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
