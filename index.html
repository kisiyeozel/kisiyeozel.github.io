<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kişiye Özel</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%); 
            color: #fff; 
            margin: 0; 
            padding: 20px 0;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .card { 
            background: rgba(30, 30, 50, 0.65); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 20px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(0, 173, 181, 0.1); 
            max-width: 400px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            margin-bottom: 20px;
        }
        .logo-container { width: 100px; height: 100px; margin: 0 auto 15px auto; }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #00adb5; box-shadow: 0 0 15px rgba(0, 173, 181, 0.4); }
        h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 700; background: linear-gradient(45deg, #fff, #00adb5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #b3b3b3; font-size: 13px; margin-bottom: 15px; margin-top: 0; }
        .links { display: flex; gap: 10px; margin-bottom: 15px; }
        .links a { flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); color: #fff; text-decoration: none; padding: 10px; border-radius: 12px; font-weight: 600; font-size: 13px; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .links a:hover { background: #00adb5; box-shadow: 0 0 15px rgba(0, 173, 181, 0.4); border-color: #00adb5; }
        
        .countdown-title { font-size: 10px; color: #00adb5; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .countdown { display: flex; justify-content: space-between; margin-top: 8px; background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.03); }
        .countdown-item { flex: 1; display: flex; flex-direction: column; }
        .countdown-time { font-size: 16px; font-weight: 700; color: #fff; }
        .countdown-label { font-size: 8px; color: #777; }

        /* Oyunlar Bölümü */
        .games-section { max-width: 400px; width: 90%; }
        .game-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #222831; border: 1px solid #393e46; color: #aaa; padding: 12px 5px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #00adb5; color: #fff; border-color: #00adb5; box-shadow: 0 0 15px rgba(0,173,181,0.4); }
        
        .game-container { 
            background: rgba(20, 20, 35, 0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .game-container.active { display: block; }
        
        canvas { background: #0b0b13; display: block; margin: 0 auto; border-radius: 12px; border: 1px solid #222; max-width: 100%; }
        .game-btn { background: #00adb5; border: none; color: white; padding: 8px 16px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .game-btn:hover { background: #008c92; }

        /* 2048 Stilleri */
        .g2048-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #222; padding: 8px; border-radius: 12px; width: 240px; height: 240px; margin: 0 auto; }
        .g2048-cell { background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #fff; }
        .controls-2048 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 150px; margin: 10px auto 0 auto; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/kisiyeozel/kisiyeozel.github.io/main/IMG_7402.jpeg" alt="Logo" class="logo" onerror="this.src='https://ui-avatars.com/api/?name=KO&background=00adb5&color=fff'">
        </div>
        <h1>Kişiye Özel</h1>
        <p>Kişisel web sitemiz 1 Haziran'da açılıyor!</p>
        <div class="links">
            <a href="https://instagram.com/kisiyeozelorg" target="_blank">Instagram</a>
            <a href="mailto:info@kisiyeozel.org">E-Posta</a>
        </div>
        <div class="countdown-title">Büyük Açılış</div>
        <div class="countdown">
            <div class="countdown-item"><span class="countdown-time" id="days">00</span><span class="countdown-label">Gün</span></div>
            <div class="countdown-item"><span class="countdown-time" id="hours">00</span><span class="countdown-label">Saat</span></div>
            <div class="countdown-item"><span class="countdown-time" id="minutes">00</span><span class="countdown-label">Dk</span></div>
            <div class="countdown-item"><span class="countdown-time" id="seconds">00</span><span class="countdown-label">Sn</span></div>
        </div>
    </div>

    <div class="games-section">
        <div class="game-tabs">
            <button class="tab-btn active" onclick="switchGame('flappy')">🚀 Flappy</button>
            <button class="tab-btn" onclick="switchGame('brick')">🧱 Tuğla</button>
            <button class="tab-btn" onclick="switchGame('g2048')">🔢 2048</button>
        </div>
        
        <div id="game-flappy" class="game-container active">
            <div id="flappy-score" style="font-size:16px; font-weight:bold; margin-bottom:5px; color:#00adb5;">Skor: 0</div>
            <canvas id="flappyCanvas" width="280" height="320"></canvas>
            <p style="font-size:11px; margin-top:5px; color:#666;">Zıplamak için haritaya TIKLA veya DOKUN</p>
        </div>

        <div id="game-brick" class="game-container">
            <div id="brick-score" style="font-size:16px; font-weight:bold; margin-bottom:5px; color:#00adb5;">Skor: 0</div>
            <canvas id="brickCanvas" width="280" height="320"></canvas>
            <p style="font-size:11px; margin-top:5px; color:#666;">Alttaki çubuğu parmağınla/farenle kaydır</p>
        </div>

        <div id="game-g2048" class="game-container">
            <div id="score-2048" style="font-size:16px; font-weight:bold; margin-bottom:5px; color:#00adb5;">Skor: 0</div>
            <div class="g2048-grid" id="board-2048"></div>
            <div class="controls-2048">
                <div></div><button class="game-btn" style="margin:0; padding:5px;" onclick="move2048('up')">▲</button><div></div>
                <button class="game-btn" style="margin:0; padding:5px;" onclick="move2048('left')">◀</button>
                <button class="game-btn" style="margin:0; padding:5px;" onclick="move2048('down')">▼</button>
                <button class="game-btn" style="margin:0; padding:5px;" onclick="move2048('right')">▶</button>
            </div>
        </div>
    </div>

    <script>
        // Sayaç (1 Haziran 2026)
        const targetDate = new Date("June 1, 2026 00:00:00").getTime();
        setInterval(() => {
            const difference = targetDate - new Date().getTime();
            if (difference < 0) return;
            document.getElementById('days').innerText = String(Math.floor(difference / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((difference % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((difference % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((difference % 60000) / 1000)).padStart(2, '0');
        }, 1000);

        let activeGame = 'flappy';
        function switchGame(game) {
            activeGame = game;
            document.querySelectorAll('.game-container, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('game-' + game).classList.add('active');
            event.target.classList.add('active');
            if(game === 'flappy') initFlappy();
            if(game === 'brick') initBrick();
            if(game === 'g2048') init2048();
        }

        // --- 1. FLAPPY BIRD (UZAY MODU) ---
        let fCanvas = document.getElementById("flappyCanvas"), fCtx = fCanvas.getContext("2d");
        let birdY, birdV, pipes, fScore, fLoop;
        function initFlappy(){
            cancelAnimationFrame(fLoop); birdY = 150; birdV = 0; pipes = []; fScore = 0;
            document.getElementById("flappy-score").innerText = "Skor: 0";
            fLoop = requestAnimationFrame(updateFlappy);
        }
        function updateFlappy(){
            if(activeGame !== 'flappy') return;
            birdV += 0.25; birdY += birdV;
            if(birdY > 310 || birdY < 0) return initFlappy();
            
            if(pipes.length === 0 || pipes[pipes.length-1].x < 140){
                pipes.push({x: 280, top: Math.random()*120 + 30, passed: false});
            }
            
            fCtx.clearRect(0,0,280,320);
            fCtx.fillStyle = "#00adb5"; 
            fCtx.fillRect(40, birdY, 16, 16);
            
            pipes.forEach((p, i) => {
                p.x -= 2;
                fCtx.fillStyle = "#393e46";
                fCtx.fillRect(p.x, 0, 35, p.top);
                fCtx.fillRect(p.x, p.top + 90, 35, 320);
                
                if(!p.passed && p.x < 40){ p.passed = true; fScore++; document.getElementById("flappy-score").innerText = "Skor: " + fScore; }
                if(p.x < 56 && p.x + 35 > 40 && (birdY < p.top || birdY + 16 > p.top + 90)) initFlappy();
            });
            pipes = pipes.filter(p => p.x > -40);
            fLoop = requestAnimationFrame(updateFlappy);
        }
        fCanvas.addEventListener('click', () => birdV = -5.5);

        // --- 2. BRICK BREAKER ---
        let bCanvas = document.getElementById("brickCanvas"), bCtx = bCanvas.getContext("2d");
        let ball, paddle, bricks, bScore, bLoop;
        function initBrick(){
            cancelAnimationFrame(bLoop); bScore = 0; document.getElementById("brick-score").innerText = "Skor: 0";
            ball = {x: 140, y: 200, dx: 2.5, dy: -2.5, r: 6}; paddle = {x: 110, w: 60, h: 10}; bricks = [];
            for(let r=0; r<4; r++) for(let c=0; c<6; c++) bricks.push({x: c*42+15, y: r*15+30, w: 36, h: 10, v: true});
            bLoop = requestAnimationFrame(updateBrick);
        }
        function updateBrick(){
            if(activeGame !== 'brick') return;
            ball.x += ball.dx; ball.y += ball.dy;
            if(ball.x<0 || ball.x>280) ball.dx *= -1;
            if(ball.y < 0) ball.dy *= -1;
            if(ball.y > 320) return initBrick();
            if(ball.y > 300 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) ball.dy = -3;

            bCtx.clearRect(0,0,280,320);
            bCtx.fillStyle = "#fff"; bCtx.beginPath(); bCtx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); bCtx.fill();
            bCtx.fillStyle = "#00adb5"; bCtx.fillRect(paddle.x, 305, paddle.w, paddle.h);

            bricks.forEach(b => {
                if(!b.v) return;
                if(ball.x > b.x && ball.x < b.x+b.w && ball.y > b.y && ball.y < b.y+b.h){ b.v = false; ball.dy *= -1; bScore += 10; document.getElementById("brick-score").innerText = "Skor: " + bScore; }
                bCtx.style = "#ff0055"; bCtx.fillRect(b.x, b.y, b.w, b.h);
            });
            bLoop = requestAnimationFrame(updateBrick);
        }
        bCanvas.addEventListener('mousemove', (e) => { let rect = bCanvas.getBoundingClientRect(); paddle.x = e.clientX - rect.left - paddle.w/2; });
        bCanvas.addEventListener('touchmove', (e) => { let rect = bCanvas.getBoundingClientRect(); paddle.x = e.touches[0].clientX - rect.left - paddle.w/2; });

        // --- 3. 2048 MINI ---
        let grid2048 = [], s2048 = 0;
        function init2048(){
            grid2048 = Array(16).fill(0); s2048 = 0; document.getElementById("score-2048").innerText = "Skor: 0";
            addTile(); addTile(); draw2048();
        }
        function addTile(){
            let empties = grid2048.map((v,i) => v===0?i:null).filter(v => v!==null);
            if(empties.length > 0) grid2048[empties[Math.floor(Math.random()*empties.length)]] = Math.random() > 0.1 ? 2 : 4;
        }
        function draw2048(){
            let b = document.getElementById("board-2048"); b.innerHTML = "";
            let colors = {2:"#393e46", 4:"#00adb5", 8:"#ff0055", 16:"#f39c12", 32:"#9b59b6", 64:"#2ecc71", 128:"#e74c3c", 256:"#1abc9c", 512:"#f1c40f", 1024:"#e67e22", 2048:"#34495e"};
            grid2048.forEach(v => {
                let c = document.createElement("div"); c.className = "g2048-cell"; c.innerText = v || "";
                if(v) c.style.background = colors[v] || "#ff0055";
                b.appendChild(c);
            });
            document.getElementById("score-2048").innerText = "Skor: " + s2048;
        }
        function move2048(dir){
            let moved = false;
            for(let i=0; i<4; i++){
                let line = [];
                for(let j=0; j<4; j++) {
                    let idx = (dir==='up'||dir==='down') ? (j*4+i) : (i*4+j);
                    if(grid2048[idx] !== 0) line.push(grid2048[idx]);
                }
                if(dir==='down' || dir==='right') line.reverse();
                
                let newLine = [];
                for(let j=0; j<line.length; j++){
                    if(line[j] === line[j+1]){ newLine.push(line[j]*2); s2048 += line[j]*2; j++; moved = true; }
                    else { newLine.push(line[j]); }
                }
                while(newLine.length < 4) newLine.push(0);
                if(dir==='down' || dir==='right') newLine.reverse();
                
                for(let j=0; j<4; j++) {
                    let idx = (dir==='up'||dir==='down') ? (j*4+i) : (i*4+j);
                    if(grid2048[idx] !== newLine[j]) { grid2048[idx] = newLine[j]; moved = true; }
                }
            }
            if(moved) { addTile(); draw2048(); }
        }

        initFlappy();
    </script>
</body>
</html>
